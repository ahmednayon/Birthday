
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ammu 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --rose:  #f4a7b9; --deep:  #d4708a; --peach: #fcd5b5;
  --gold:  #e8c98a; --cream: #fff5f0; --text:  #6b3a4f;
  --soft:  #c98fa0; --white: rgba(255,255,255,0.92);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Cormorant Garamond', serif;
  background: var(--cream);
}

/* ── DREAMY SKY BG ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 10% 10%, #ffe8f4 0%, transparent 50%),
    radial-gradient(ellipse at 90% 5%,  #ffecd8 0%, transparent 45%),
    radial-gradient(ellipse at 55% 90%, #fde0f4 0%, transparent 60%),
    radial-gradient(ellipse at 20% 70%, #fff0e8 0%, transparent 50%),
    linear-gradient(160deg, #fff3fa 0%, #fff9f0 40%, #ffeef7 100%);
  animation: bgBreath 10s ease-in-out infinite alternate;
}
@keyframes bgBreath {
  from { filter: brightness(1) saturate(1); }
  to   { filter: brightness(1.06) saturate(1.12); }
}

/* ── LIGHT RAYS ── */
.rays {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    conic-gradient(from 220deg at 38% 0%, transparent 0deg, rgba(255,210,230,0.12) 2deg, transparent 4deg,
      transparent 10deg, rgba(255,235,200,0.10) 12deg, transparent 14deg,
      transparent 22deg, rgba(255,200,220,0.09) 24deg, transparent 26deg,
      transparent 38deg, rgba(255,220,240,0.08) 40deg, transparent 42deg);
  animation: raysSpin 60s linear infinite;
}
@keyframes raysSpin { to { transform: rotate(360deg); } }

/* ── CANVAS ── */
#petals { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

/* ── GROUND MIST ── */
.mist {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 4;
  height: 220px;
  background: linear-gradient(to top, rgba(255,240,248,0.85) 0%, transparent 100%);
  pointer-events: none;
}

/* ── TREE SVG ── */
#tree-svg {
  position: fixed;
  bottom: -30px; left: -80px;
  width: min(88vw, 860px);
  height: auto;
  z-index: 3;
  filter: drop-shadow(0 30px 60px rgba(180,80,120,0.22));
  transform-origin: 30% 100%;
  animation: treeSway 8s ease-in-out infinite alternate;
}
@keyframes treeSway {
  from { transform: rotate(-1.5deg) scale(1); }
  to   { transform: rotate(1.5deg) scale(1.005); }
}
.bc { transform-origin: 50% 95%; }
.bc1 { animation: bSway1 5s ease-in-out infinite alternate; }
.bc2 { animation: bSway2 6.5s ease-in-out infinite alternate-reverse; }
.bc3 { animation: bSway1 4s ease-in-out infinite alternate; }
.bc4 { animation: bSway2 7s ease-in-out infinite alternate-reverse; }
.bc5 { animation: bSway1 5.5s ease-in-out infinite alternate; }
.bc6 { animation: bSway2 4.8s ease-in-out infinite alternate-reverse; }
.bc7 { animation: bSway1 6s ease-in-out infinite alternate; }
@keyframes bSway1 { from { transform:rotate(-4deg); } to { transform:rotate(4deg); } }
@keyframes bSway2 { from { transform:rotate(-3deg); } to { transform:rotate(3deg); } }

/* ── CARD ── */
.card {
  position: fixed;
  top: 50%; right: 4vw;
  z-index: 10;
  width: clamp(270px, 36vw, 420px);
  padding: 2.8rem 2.8rem 3rem;
  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.72) 0%,
    rgba(255,248,252,0.60) 50%,
    rgba(255,240,248,0.68) 100%
  );
  backdrop-filter: blur(32px) saturate(1.6);
  border-radius: 36px;
  border: 1.5px solid rgba(255,185,210,0.60);
  box-shadow:
    0 30px 90px rgba(212,112,138,0.22),
    0 8px 24px rgba(212,112,138,0.12),
    0 2px 6px rgba(212,112,138,0.08),
    inset 0 2px 0 rgba(255,255,255,0.98),
    inset 0 -1px 0 rgba(255,200,215,0.4),
    inset 1px 0 0 rgba(255,255,255,0.6);
  text-align: center;
  opacity: 0;
  transform: translateY(calc(-50% + 30px));
  animation: cardIn 1.8s cubic-bezier(.22,.8,.36,1) 0.8s forwards;
}
@keyframes cardIn { to { opacity: 1; transform: translateY(-50%); } }

/* inner glow ring */
.card::before {
  content: '';
  position: absolute; inset: 4px;
  border-radius: 33px;
  border: 1px solid rgba(255,215,230,0.55);
  background: linear-gradient(145deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
}

/* sparkle corners */
.sp {
  position: absolute; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: spAnim 3.5s ease-in-out infinite;
  pointer-events: none; z-index: 1;
}
.sp:nth-child(1){top:20px;left:24px;animation-delay:0s}
.sp:nth-child(2){top:20px;right:24px;animation-delay:.7s}
.sp:nth-child(3){bottom:24px;left:24px;animation-delay:1.4s}
.sp:nth-child(4){bottom:24px;right:24px;animation-delay:2.1s}
@keyframes spAnim {
  0%,100%{opacity:0;transform:scale(0) rotate(0deg)}
  50%{opacity:1;transform:scale(3) rotate(45deg);box-shadow:0 0 10px 3px var(--gold), 0 0 20px 6px rgba(232,201,138,0.4)}
}

.flower-row {
  display: flex; justify-content: center; gap: .5rem;
  margin-bottom: 1.2rem;
  opacity: 0; animation: fadeUp 1s ease 1.4s forwards;
}
.flower-row svg { width: 30px; height: 30px; }

.tag {
  font-size: .72rem; letter-spacing: .44em; text-transform: uppercase;
  color: var(--soft); font-weight: 300;
  margin-bottom: .7rem;
  opacity: 0; animation: fadeUp 1s ease 1.7s forwards;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.7rem, 3.8vw, 2.6rem);
  color: var(--text); line-height: 1.18;
  opacity: 0; animation: fadeUp 1.2s ease 1.9s forwards;
}
h1 em {
  display: block; font-style: italic; font-size: 1.32em;
  background: linear-gradient(135deg, #be4a6e 0%, #d97c50 60%, #c85070 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
}

.line {
  display: flex; align-items: center; gap: .7rem;
  margin: 1.3rem 0;
  opacity: 0; animation: fadeUp 1s ease 2.2s forwards;
}
.line::before,.line::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg,transparent,var(--rose),transparent);
}
.line span { font-size: 1rem; }

.msg {
  font-style: italic; color: var(--text);
  font-size: 1.05rem; line-height: 1.9; font-weight: 300;
  opacity: 0; animation: fadeUp 1s ease 2.4s forwards;
  letter-spacing: 0.01em;
}

.sub { font-size: .9em; opacity: .72; margin-top: .3rem; display: block; }

.dots {
  display: flex; justify-content: center; gap: .55rem; margin-top: 1.6rem;
  opacity: 0; animation: fadeUp 1s ease 2.6s forwards;
}
.dot { width: 7px; height: 7px; border-radius: 50%; animation: dotGlow 2s ease-in-out infinite alternate; }
.dot:nth-child(1){background:var(--rose);color:var(--rose);animation-delay:0s}
.dot:nth-child(2){background:var(--gold);color:var(--gold);animation-delay:.4s}
.dot:nth-child(3){background:var(--peach);color:var(--peach);animation-delay:.8s}
.dot:nth-child(4){background:var(--rose);color:var(--rose);animation-delay:1.2s}
@keyframes dotGlow {
  from{box-shadow:0 0 4px 1px currentColor;transform:scale(1)}
  to{box-shadow:0 0 10px 4px currentColor;transform:scale(1.35)}
}

/* shimmer sweep */
.card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 36px;
  background: linear-gradient(
    105deg,
    transparent 35%,
    rgba(255,255,255,0.22) 50%,
    transparent 65%
  );
  background-size: 200% 100%;
  animation: shimmer 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  40%  { background-position: -200% 0; }
  100% { background-position: -200% 0; }
}

@keyframes fadeUp {
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── PHOTO SLOT ── */
.photo-slot {
  position: relative;
  width: 96px; height: 96px;
  margin: 0 auto 1.4rem;
  opacity: 0; animation: fadeUp 1s ease 1.2s forwards;
}

.photo-ring {
  position: absolute; inset: -5px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    #f4a7b9, #e8c98a, #fcd5b5, #f4a7b9, #d4708a, #e8c98a, #f4a7b9
  );
  animation: ringRotate 4s linear infinite;
  z-index: 0;
}
@keyframes ringRotate { to { transform: rotate(360deg); } }

.photo-ring::after {
  content: '';
  position: absolute; inset: 3px;
  border-radius: 50%;
  background: rgba(255,248,252,0.95);
}

.photo-circle {
  position: relative; z-index: 1;
  width: 96px; height: 96px;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  background: linear-gradient(145deg, #ffeef6, #fff0f8);
  border: 3px solid rgba(255,255,255,0.9);
  box-shadow: 0 4px 20px rgba(212,112,138,0.25);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.photo-circle:hover { transform: scale(1.05); box-shadow: 0 8px 28px rgba(212,112,138,0.35); }

.photo-circle img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
  border-radius: 50%;
}

.photo-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  color: var(--soft);
  transition: opacity 0.2s;
}
.photo-placeholder svg { width: 28px; height: 28px; opacity: 0.7; }
.photo-placeholder span { font-size: 0.6rem; letter-spacing: .1em; opacity: 0.8; }

.photo-circle:hover .photo-placeholder { opacity: 0.7; }

#photo-input { display: none; }

.photo-remove {
  position: absolute; top: -2px; right: -2px; z-index: 2;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--deep); color: #fff;
  border: 2px solid #fff;
  font-size: 12px; line-height: 1;
  cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.photo-remove:hover { transform: scale(1.15); }
.photo-remove.visible { display: flex; }

/* ── MOBILE RESPONSIVE FIX ── */
@media (max-width: 768px) {
  #tree-svg{width:110vw;left:-30px;bottom:-10px}
  .card{
    right:auto;
    left:50%;
    top:auto;
    bottom:2vh;
    transform:translateX(-50%);
    width:90vw;
    padding:1.8rem 1.6rem;
    animation: cardInMobile 1.8s cubic-bezier(.22,.8,.36,1) 0.8s forwards;
  }
}
@keyframes cardInMobile{
  from{opacity:0;transform:translateX(-50%) translateY(20px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}
</style>

<script>
// ── PHOTO SLOT ──
function loadPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = document.getElementById('photo-img');
    const placeholder = document.querySelector('.photo-placeholder');
    const removeBtn = document.getElementById('photo-remove');
    img.src = ev.target.result;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    removeBtn.classList.add('visible');
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  const img = document.getElementById('photo-img');
  const placeholder = document.querySelector('.photo-placeholder');
  const removeBtn = document.getElementById('photo-remove');
  const input = document.getElementById('photo-input');
  img.src = '';
  img.style.display = 'none';
  placeholder.style.display = 'flex';
  removeBtn.classList.remove('visible');
  input.value = '';
}
</script>

<script>
// ════════════════════════════════════════════════
//  PETAL SYSTEM
// ════════════════════════════════════════════════
const canvas = document.getElementById('petals');
const ctx = canvas.getContext('2d');

const TREE_ORIGINS = [
  {x:0.50, y:0.03},{x:0.47, y:0.06},{x:0.53, y:0.07},{x:0.44, y:0.04},
  {x:0.18, y:0.14},{x:0.14, y:0.18},{x:0.22, y:0.10},{x:0.10, y:0.22},
  {x:0.82, y:0.12},{x:0.86, y:0.16},{x:0.78, y:0.08},{x:0.90, y:0.20},
  {x:0.12, y:0.30},{x:0.08, y:0.36},{x:0.16, y:0.26},
  {x:0.84, y:0.28},{x:0.88, y:0.34},{x:0.80, y:0.24},
  {x:0.06, y:0.46},{x:0.04, y:0.52},
  {x:0.90, y:0.42},{x:0.92, y:0.48},
];

const COLORS = [
  '#f9c2d0','#f4a7b9','#fbd0df','#fce4ef',
  '#ffeef5','#fcd5b5','#ffe8f0','#f8b8cc',
  '#ffcce0','#f7afc8','#fce0ee','#fff0f8',
  '#fac5d5','#fde8f4','#f5b5ca',
];

let W, H, petals = [];
const LAYERS = [
  { count: 60, sizeMin: 5,  sizeMax: 9,  speedMult: 0.7, alpha: 0.65 },
  { count: 70, sizeMin: 8,  sizeMax: 14, speedMult: 1.0, alpha: 0.82 },
  { count: 40, sizeMin: 13, sizeMax: 20, speedMult: 1.3, alpha: 0.95 },
];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function spawnPetal(scatter, layer) {
  const origin = TREE_ORIGINS[Math.floor(Math.random() * TREE_ORIGINS.length)];
  const size = layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin);
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const baseOpacity = layer.alpha * (0.7 + Math.random() * 0.3);
  return {
    x:       scatter ? Math.random() * W : origin.x * W + (Math.random()-0.5)*100,
    y:       scatter ? Math.random() * H * 0.8 : origin.y * H + (Math.random()-0.5)*50,
    size,
    color,
    speed:   (0.3 + Math.random() * 0.6) * layer.speedMult,
    driftX:  (Math.random() - 0.5) * 0.5,
    swayA:   Math.random() * Math.PI * 2,
    swayS:   0.005 + Math.random() * 0.012,
    swayAmp: 0.5 + Math.random() * 1.4,
    windA:   Math.random() * Math.PI * 2,
    windS:   0.002 + Math.random() * 0.005,
    windAmp: 0.2 + Math.random() * 0.6,
    angle:   Math.random() * Math.PI * 2,
    spin:    (Math.random() - 0.5) * 0.038,
    tilt:    Math.random() * Math.PI,
    tiltS:   0.008 + Math.random() * 0.018,
    opacity: baseOpacity,
    petalLen: 0.50 + Math.random() * 0.14,
    petalWid: 0.26 + Math.random() * 0.12,
    layer,
  };
}

for (const layer of LAYERS) {
  for (let i = 0; i < layer.count; i++) {
    petals.push(spawnPetal(true, layer));
  }
}

function drawFlower(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  const r = p.size;

  for (let i = 0; i < 5; i++) {
    ctx.save();
    ctx.rotate((i * Math.PI * 2) / 5 + p.tilt);
    ctx.beginPath();
    const ly = -r * p.petalLen;
    const w  = r * p.petalWid;
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-w, -r*0.28, -w, ly - r*0.08, 0, ly);
    ctx.bezierCurveTo( w, ly - r*0.08,  w, -r*0.28, 0, 0);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size > 10 ? 5 : 2;
    ctx.fill();
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(0, 0, r * 0.17, 0, Math.PI * 2);
  ctx.fillStyle = r > 10 ? '#f0c070' : '#e8c98a';
  ctx.shadowBlur = 0;
  ctx.fill();

  ctx.restore();
}

let burstTimer = 0;
function maybeBurst(dt) {
  burstTimer += dt;
  if (burstTimer > 180 + Math.random() * 200) {
    burstTimer = 0;
    const origin = TREE_ORIGINS[Math.floor(Math.random() * TREE_ORIGINS.length)];
    const n = 6 + Math.floor(Math.random() * 8);
    for (let i = 0; i < n; i++) {
      const layer = LAYERS[Math.floor(Math.random() * LAYERS.length)];
      const p = spawnPetal(false, layer);
      p.x = origin.x * W + (Math.random()-0.5)*60;
      p.y = origin.y * H + (Math.random()-0.5)*30;
      p.speed *= 0.5 + Math.random() * 0.5;
      petals.push(p);
    }
    while (petals.length > 250) petals.shift();
  }
}

let lastTime = 0;
function tick(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  ctx.clearRect(0, 0, W, H);

  maybeBurst(dt);

  for (let p of petals) {
    p.swayA  += p.swayS  * dt;
    p.windA  += p.windS  * dt;
    p.tilt   += p.tiltS  * dt;
    p.x      += (p.driftX + Math.sin(p.swayA) * p.swayAmp + Math.cos(p.windA) * p.windAmp) * dt;
    p.y      += p.speed * dt;
    p.angle  += p.spin * dt;

    const bottomFade = Math.max(0, 1 - Math.max(0, p.y - H * 0.85) / (H * 0.15));
    ctx.globalAlpha = p.opacity * bottomFade;

    if (p.y > H + p.size * 4) {
      Object.assign(p, spawnPetal(false, p.layer));
    }
    drawFlower(p);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
